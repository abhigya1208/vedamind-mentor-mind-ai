version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: vedamind-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vedamind

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: vedamind-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/vedamind
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-devsecret}
    depends_on:
      - mongo

volumes:
  mongo-data:
